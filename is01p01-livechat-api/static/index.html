<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron Stack Labs — LiveChat Support</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient-start: #0f172a;
            --bg-gradient-end: #020617;
            --panel-bg: rgba(30, 41, 59, 0.4);
            --panel-border: rgba(255, 255, 255, 0.08);
            --accent-primary: hsl(217, 91%, 60%);
            --accent-glow: rgba(59, 130, 246, 0.15);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --user-bubble-bg: hsl(217, 91%, 60%);
            --assistant-bubble-bg: rgba(30, 41, 59, 0.8);
            --error-color: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow: hidden;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 85vh;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--panel-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(15, 23, 42, 0.2);
        }

        .brand {
            display: flex;
            flex-direction: column;
        }

        .brand h1 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #60a5fa, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand span {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 500;
            margin-top: 2px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #4ade80;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 10px #22c55e;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.5; }
            100% { transform: scale(0.9); opacity: 1; }
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            animation: messageSlideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes messageSlideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
        }

        .message.assistant {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .user .message-bubble {
            background-color: var(--user-bubble-bg);
            color: #ffffff;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.2);
        }

        .assistant .message-bubble {
            background-color: var(--assistant-bubble-bg);
            border: 1px solid var(--panel-border);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }

        .message-sender {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
            font-weight: 500;
            display: flex;
            gap: 6px;
        }

        .user .message-sender {
            align-self: flex-end;
        }

        .assistant .message-sender {
            align-self: flex-start;
        }

        .chat-input-area {
            padding: 20px 24px;
            border-top: 1px solid var(--panel-border);
            background: rgba(15, 23, 42, 0.2);
            display: flex;
            gap: 12px;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .chat-input {
            width: 100%;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--panel-border);
            padding: 14px 18px;
            border-radius: 14px;
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: all 0.2s ease;
            outline: none;
        }

        .chat-input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 4px var(--accent-glow);
            background: rgba(15, 23, 42, 0.6);
        }

        .send-btn {
            background: var(--accent-primary);
            border: none;
            color: white;
            padding: 0 24px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.3);
            filter: brightness(1.1);
        }

        .send-btn:active {
            transform: translateY(1px);
        }

        .send-btn:disabled {
            background: rgba(148, 163, 184, 0.2);
            color: var(--text-secondary);
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .error-bubble {
            background-color: rgba(239, 68, 68, 0.1) !important;
            border: 1px solid rgba(239, 68, 68, 0.2) !important;
            color: var(--error-color) !important;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="brand">
                <h1>Iron Chat</h1>
                <span>LiveChat Support API · is01p01</span>
            </div>
            <div class="status-badge">
                <div class="status-dot"></div>
                Ollama Active
            </div>
        </div>

        <div class="chat-messages" id="messages-container">
            <div class="message assistant">
                <div class="message-sender">Support Assistant</div>
                <div class="message-bubble">Hello! I am connected to the local LLM gateway. Ask me anything to begin token-by-token streaming.</div>
            </div>
        </div>

        <div class="chat-input-area">
            <div class="input-wrapper">
                <input id="msg" class="chat-input" type="text" placeholder="Type your message here..." onkeydown="if(event.key === 'Enter') send()" autocomplete="off" />
            </div>
            <button id="send-btn" class="send-btn" onclick="send()">Send</button>
        </div>
    </div>

    <script>
        function send() {
            const input = document.getElementById('msg');
            const button = document.getElementById('send-btn');
            const msgText = input.value.trim();
            if (!msgText) return;

            input.value = '';
            input.disabled = true;
            button.disabled = true;

            const container = document.getElementById('messages-container');

            const userMsgDiv = document.createElement('div');
            userMsgDiv.className = 'message user';
            userMsgDiv.innerHTML = `
                <div class="message-sender">You</div>
                <div class="message-bubble"></div>
            `;
            userMsgDiv.querySelector('.message-bubble').textContent = msgText;
            container.appendChild(userMsgDiv);
            container.scrollTop = container.scrollHeight;

            const assistantMsgDiv = document.createElement('div');
            assistantMsgDiv.className = 'message assistant';
            assistantMsgDiv.innerHTML = `
                <div class="message-sender">Support Assistant</div>
                <div class="message-bubble"></div>
            `;
            const bubble = assistantMsgDiv.querySelector('.message-bubble');
            container.appendChild(assistantMsgDiv);
            container.scrollTop = container.scrollHeight;

            fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: msgText })
            }).then(response => {
                if (!response.ok) {
                    response.json().then(err => {
                        bubble.className += ' error-bubble';
                        bubble.textContent = '[ERROR] ' + (err.detail || 'Failed to initialize request.');
                        finalize();
                    }).catch(() => {
                        bubble.className += ' error-bubble';
                        bubble.textContent = '[ERROR] Server returned error response.';
                        finalize();
                    });
                    return;
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                function read() {
                    reader.read().then(({ done, value }) => {
                        if (done) {
                            finalize();
                            return;
                        }
                        const text = decoder.decode(value);
                        const lines = text.split('\n');
                        lines.forEach(line => {
                            if (line.startsWith('data: ')) {
                                const token = line.slice(6);
                                if (token === '[DONE]') {
                                    return;
                                }
                                if (token.startsWith('[ERROR]')) {
                                    bubble.className += ' error-bubble';
                                    bubble.textContent += '\n' + token;
                                    return;
                                }
                                bubble.textContent += token;
                            }
                        });
                        container.scrollTop = container.scrollHeight;
                        read();
                    }).catch(err => {
                        bubble.className += ' error-bubble';
                        bubble.textContent += '\n[CONNECTION LOST] ' + err;
                        finalize();
                    });
                }
                read();
            }).catch(err => {
                bubble.className += ' error-bubble';
                bubble.textContent = '[ERROR] Network request failed: ' + err;
                finalize();
            });

            function finalize() {
                input.disabled = false;
                button.disabled = false;
                input.focus();
                container.scrollTop = container.scrollHeight;
            }
        }
    </script>
</body>
</html>
